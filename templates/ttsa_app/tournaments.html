{% extends 'ttsa_app/base.html' %}

{% block title %}Tournaments - TTSA Academy{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-6">
    <!-- Header -->
    <div class="bg-gradient-to-r from-orange-500 to-red-600 rounded-xl shadow-lg p-6 mb-6 text-white">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="fredoka text-3xl font-bold mb-2">Tournaments</h1>
                <p class="text-orange-100">Compete in exciting chess tournaments and test your skills!</p>
            </div>
            <div class="text-center">
                <div class="text-3xl font-bold" id="totalTournamentsCount">0</div>
                <div class="text-sm text-orange-100">Tournaments</div>
            </div>
        </div>
    </div>

    <!-- Upcoming Tournaments -->
    <!-- Search and Filter -->
    <div class="bg-white rounded-xl shadow-lg p-4 mb-6">
        <div class="flex flex-col md:flex-row gap-4">
            <div class="flex-1">
                <div class="relative">
                    <input type="text" id="upcomingTournamentsSearch" placeholder="Search upcoming tournaments..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                    <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                </div>
            </div>
            <div class="md:w-48">
                <select id="upcomingTournamentsFilter" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                    <option value="">All Categories</option>
                    <option value="open">Open</option>
                    <option value="junior">Junior</option>
                    <option value="senior">Senior</option>
                    <option value="rapid">Rapid</option>
                    <option value="blitz">Blitz</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Upcoming Tournaments Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="upcomingTournamentsGrid">
        <div class="col-span-full text-center py-8">
            <i class="fas fa-spinner fa-spin fa-2x text-gray-400 mb-2"></i>
            <p class="text-gray-600">Loading upcoming tournaments...</p>
        </div>
    </div>
</div>

<script>
// Tournament Data
let upcomingTournamentsData = [];

// Load tournament data from backend API
function loadTournamentData() {
    fetch('/api/tournaments/', {
        method: 'GET',
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            // Transform API data to match frontend structure
            upcomingTournamentsData = data.tournaments.map(tournament => ({
                id: tournament.id,
                name: tournament.name,
                venue: tournament.venue,
                date: tournament.start_date.split('T')[0], // Extract date part
                time: new Date(tournament.start_date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                time_control: tournament.time_control,
                registration_deadline: tournament.registration_deadline.split('T')[0],
                entry_fee: tournament.entry_fee,
                available_slots: tournament.available_slots,
                total_slots: tournament.max_players,
                category: tournament.category,
                format: tournament.format,
                rounds: tournament.rounds,
                is_registered: tournament.is_registered,
                is_registration_open: tournament.is_registration_open,
                is_full: tournament.is_full
            }));
            
            // Update total count
            document.getElementById('totalTournamentsCount').textContent = upcomingTournamentsData.length;
            
            // Render data
            renderUpcomingTournaments();
        } else {
            console.error('Error loading tournaments:', data.error);
            showError('Failed to load tournaments. Please try again later.');
        }
    })
    .catch(error => {
        console.error('Error loading tournaments:', error);
        showError('Failed to load tournaments. Please try again later.');
    });
}

// Show error message
function showError(message) {
    const grid = document.getElementById('upcomingTournamentsGrid');
    grid.innerHTML = `
        <div class="col-span-full text-center py-8">
            <i class="fas fa-exclamation-triangle fa-2x text-red-400 mb-2"></i>
            <p class="text-red-600">${message}</p>
        </div>
    `;
}

// Render Upcoming Tournaments
function renderUpcomingTournaments() {
    const grid = document.getElementById('upcomingTournamentsGrid');
    
    if (upcomingTournamentsData.length === 0) {
        grid.innerHTML = `
            <div class="col-span-full text-center py-8">
                <i class="fas fa-calendar-times fa-3x text-gray-300 mb-4"></i>
                <p class="text-gray-600">No upcoming tournaments available.</p>
                <p class="text-sm text-gray-500">Check back later for new events!</p>
            </div>
        `;
        return;
    }

    grid.innerHTML = upcomingTournamentsData.map(tournament => {
        const slotsPercentage = (tournament.available_slots / tournament.total_slots) * 100;
        const isFull = tournament.is_full || tournament.available_slots === 0;
        const isRegistered = tournament.is_registered;
        const canRegister = !isFull && !isRegistered && tournament.is_registration_open;
        const categoryColors = {
            open: 'bg-purple-100 text-purple-800',
            junior: 'bg-blue-100 text-blue-800',
            senior: 'bg-green-100 text-green-800',
            rapid: 'bg-yellow-100 text-yellow-800',
            blitz: 'bg-red-100 text-red-800'
        };

        // Determine button state and text
        let buttonText = 'Register Now';
        let buttonClass = 'bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600';
        let buttonDisabled = '';
        
        if (isRegistered) {
            buttonText = 'Registered ✓';
            buttonClass = 'bg-green-500 cursor-not-allowed';
            buttonDisabled = 'disabled';
        } else if (isFull) {
            buttonText = 'Registration Full';
            buttonClass = 'bg-gray-300 cursor-not-allowed';
            buttonDisabled = 'disabled';
        } else if (!tournament.is_registration_open) {
            buttonText = 'Registration Closed';
            buttonClass = 'bg-gray-400 cursor-not-allowed';
            buttonDisabled = 'disabled';
        }

        return `
            <div class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition">
                <div class="bg-gradient-to-r from-orange-500 to-red-500 p-4 text-white">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-lg">${tournament.name}</h3>
                            <p class="text-sm text-orange-100">${tournament.format} • ${tournament.rounds} Rounds</p>
                        </div>
                        <span class="px-2 py-1 ${categoryColors[tournament.category] || 'bg-gray-100 text-gray-800'} rounded-full text-xs font-semibold text-white">
                            ${tournament.category.charAt(0).toUpperCase() + tournament.category.slice(1)}
                        </span>
                    </div>
                </div>
                <div class="p-4">
                    <div class="space-y-3">
                        <div class="flex items-center text-sm">
                            <i class="fas fa-map-marker-alt w-5 text-gray-400"></i>
                            <span class="text-gray-700">${tournament.venue}</span>
                        </div>
                        <div class="flex items-center text-sm">
                            <i class="fas fa-calendar w-5 text-gray-400"></i>
                            <span class="text-gray-700">${tournament.date} at ${tournament.time}</span>
                        </div>
                        <div class="flex items-center text-sm">
                            <i class="fas fa-clock w-5 text-gray-400"></i>
                            <span class="text-gray-700">${tournament.time_control}</span>
                        </div>
                        <div class="flex items-center text-sm">
                            <i class="fas fa-hourglass-end w-5 text-gray-400"></i>
                            <span class="text-gray-700">Deadline: ${tournament.registration_deadline}</span>
                        </div>
                        <div class="flex items-center justify-between pt-2 border-t">
                            <div class="text-sm">
                                <span class="font-bold text-orange-600">$${tournament.entry_fee}</span>
                                <span class="text-gray-500"> entry fee</span>
                            </div>
                            <div class="text-sm">
                                <span class="font-bold ${isFull ? 'text-red-600' : 'text-green-600'}">${tournament.available_slots}</span>
                                <span class="text-gray-500">/${tournament.total_slots} slots</span>
                            </div>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="bg-gradient-to-r from-orange-500 to-red-500 h-2 rounded-full" style="width: ${slotsPercentage}%"></div>
                        </div>
                        <button 
                            onclick="registerForTournament(${tournament.id})"
                            class="w-full py-2 ${buttonClass} text-white rounded-lg font-semibold transition"
                            ${buttonDisabled}>
                            ${buttonText}
                        </button>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

// Register for tournament
function registerForTournament(tournamentId) {
    const tournament = upcomingTournamentsData.find(t => t.id === tournamentId);
    if (tournament) {
        if (confirm(`Are you sure you want to register for "${tournament.name}"?\n\nEntry fee: $${tournament.entry_fee}\nDate: ${tournament.date}\nTime: ${tournament.time}`)) {
            // Show loading state
            const button = document.querySelector(`button[onclick="registerForTournament(${tournamentId})"]`);
            const originalText = button.textContent;
            button.disabled = true;
            button.textContent = 'Registering...';
            
            // Call registration API
            fetch(`/api/tournaments/${tournamentId}/register/`, {
                method: 'POST',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest',
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Update tournament data
                    tournament.available_slots -= 1;
                    tournament.is_registered = true;
                    tournament.is_full = tournament.available_slots === 0;
                    
                    // Show success message
                    showSuccessMessage(data.message || 'Registration successful!');
                    
                    // Re-render tournaments
                    renderUpcomingTournaments();
                } else {
                    // Show error message
                    showErrorMessage(data.error || 'Registration failed. Please try again.');
                }
            })
            .catch(error => {
                console.error('Registration error:', error);
                showErrorMessage('Registration failed. Please try again.');
            })
            .finally(() => {
                // Restore button state
                button.disabled = false;
                button.textContent = originalText;
            });
        }
    }
}

// Show success message
function showSuccessMessage(message) {
    // Create toast notification
    const toast = document.createElement('div');
    toast.className = 'fixed top-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50';
    toast.innerHTML = `
        <div class="flex items-center">
            <i class="fas fa-check-circle mr-2"></i>
            <span>${message}</span>
        </div>
    `;
    document.body.appendChild(toast);
    
    // Remove after 3 seconds
    setTimeout(() => {
        toast.remove();
    }, 3000);
}

// Show error message
function showErrorMessage(message) {
    // Create toast notification
    const toast = document.createElement('div');
    toast.className = 'fixed top-4 right-4 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg z-50';
    toast.innerHTML = `
        <div class="flex items-center">
            <i class="fas fa-exclamation-circle mr-2"></i>
            <span>${message}</span>
        </div>
    `;
    document.body.appendChild(toast);
    
    // Remove after 3 seconds
    setTimeout(() => {
        toast.remove();
    }, 3000);
}

// Search Upcoming Tournaments
document.getElementById('upcomingTournamentsSearch')?.addEventListener('input', function(e) {
    const searchTerm = e.target.value.toLowerCase();
    const filteredTournaments = upcomingTournamentsData.filter(tournament => 
        tournament.name.toLowerCase().includes(searchTerm) ||
        tournament.venue.toLowerCase().includes(searchTerm)
    );
    
    const grid = document.getElementById('upcomingTournamentsGrid');
    if (filteredTournaments.length === 0) {
        grid.innerHTML = `
            <div class="col-span-full text-center py-8">
                <i class="fas fa-search fa-2x text-gray-300 mb-2"></i>
                <p class="text-gray-600">No tournaments match your search</p>
            </div>
        `;
    } else {
        const originalData = upcomingTournamentsData;
        upcomingTournamentsData = filteredTournaments;
        renderUpcomingTournaments();
        upcomingTournamentsData = originalData;
    }
});

// Filter Upcoming Tournaments
document.getElementById('upcomingTournamentsFilter')?.addEventListener('change', function(e) {
    const categoryFilter = e.target.value;
    
    if (categoryFilter === '') {
        renderUpcomingTournaments();
    } else {
        const filteredTournaments = upcomingTournamentsData.filter(tournament => tournament.category === categoryFilter);
        const grid = document.getElementById('upcomingTournamentsGrid');
        
        if (filteredTournaments.length === 0) {
            grid.innerHTML = `
                <div class="col-span-full text-center py-8">
                    <i class="fas fa-filter fa-2x text-gray-300 mb-2"></i>
                    <p class="text-gray-600">No tournaments in this category</p>
                </div>
            `;
        } else {
            const originalData = upcomingTournamentsData;
            upcomingTournamentsData = filteredTournaments;
            renderUpcomingTournaments();
            upcomingTournamentsData = originalData;
        }
    }
});

// Initialize on page load
loadTournamentData();
</script>
{% endblock %}
