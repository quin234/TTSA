{% extends 'ttsa_app/base.html' %}

{% block title %}Error - TTSA Academy{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-6">
    <div class="bg-white rounded-xl shadow-lg p-8 max-w-2xl mx-auto text-center">
        <div class="text-6xl mb-4">⚠️</div>
        <h1 class="fredoka text-3xl font-bold text-red-600 mb-4">Error</h1>
        <p class="text-gray-600 text-lg mb-6">{{ error }}</p>
        <div class="flex justify-center space-x-4">
            <a href="{% url 'dashboard' %}" class="px-6 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition">
                <i class="fas fa-home mr-2"></i>Go to Dashboard
            </a>
            <a href="{% url 'multiplayer_create' %}" class="px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                <i class="fas fa-plus mr-2"></i>Create New Game
            </a>
        </div>
    </div>
</div>
{% endblock %}
